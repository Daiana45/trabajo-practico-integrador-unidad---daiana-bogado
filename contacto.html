<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="seccion-formulario py-5">
        <div class="container">
            <h2 class="text-center mb-4">Formulario de consulta</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre" placeholder="ingresa tu nombre">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com">
                        </div>
                        <div class="mb-3">
                            <label for="carrera" class="form-label">Carrera de interes</label>
                            <select class="form-select" id="carreras">
                                <option value="">Seleccioná una carrera</option>
                                <option>Tecnicatura en Mecatrónica</option>
                                <option>Tecnicatura en Desarollo de Software Multiplataforma</option>
                                <option>Tecnicatura en Química Industrial</option>
                                <option>Tecnicatura en Telecomunicaciones</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribí tu consulta aquí"></textarea>
                        </div>
                        <button type="submit" class="btn btn-enviar w-100">Enviar consulta</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <section class="seccion-datos py-5">
        <div class="container">
            <h2 class="text-center mb-4">Datos de contacto</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <ul class="list-group">
                        <li class="list-group-item d-flex align-items-center gap-3">
         <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-telephone" viewBox="0 0 16 16">
                            <path
                                d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58z" />
                        </svg>
                        <span>3704322373</span>
                        </li>
                        <li class="list-group-item d-flex align-items-center gap-3">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-envelope" viewBox="0 0 16 16">
                            <path
                                d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z" />
                        </svg>
                        <span>IPformosa@gmail.com</span>
                        </li>
                        <li class="list-group-item d-flex align-items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-geo-alt" viewBox="0 0 16 16">
                            <path
                                d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10" />
                            <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4" />
                        </svg>
                        <span>Ruta Nacional 81, kilómetro 1190, Formosa</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <section class="seccion-mapa py-5">
        <div class="container">
            <h2 class="text-center mb-4">Ubicación</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d114674.24759182468!2d-58.421430587768576!3d-26.080298094745633!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x945cb1005b21b355%3A0x36a052477a923c03!2sInstituto%20Polit%C3%A9cnico%20Formosa!5e0!3m2!1ses-419!2sar!4v1777848118727!5m2!1ses-419!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
    </section>
    <section class="section-horario py-5">
        <div class="container">
            <h2 class="text-center mb-4">Horarios de atención</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <table class="table table-bordered table-hover text-center">
                        <thead>
                            <tr>
                                <th>Día</th>
                                <th>Mañana</th>
                                <th>Tarde</th>
                            </tr>
                        </thead>
                    </table>
                    <tr>
                        <td>Lunes a Viernes</td>
                        <td>8:00 - 12:00</td>
                        <td class="text-muted">Cerrado</td>
                        <td class="text-muted">Cerrado</td>
                    </tr>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
